<section class="profile-summary" aria-label="Profile summary">
  <div class="identity">
    <p class="section-kicker">Account</p>
    <h1>{{ user().firstName }} {{ user().lastName }}</h1>
    <p>{{ user().email }}</p>
  </div>

  <dl class="stats">
    <div>
      <dt>Orders</dt>
      <dd>{{ orderCount() }}</dd>
    </div>
    <div>
      <dt>Lifetime spend</dt>
      <dd>{{ lifetimeSpend() | currency }}</dd>
    </div>
  </dl>
</section>
